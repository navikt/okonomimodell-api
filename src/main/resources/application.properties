spring.application.name=okonomimodell-api

server.servlet.context-path=/api/v1

spring.datasource.url=${OEBS_DB_URL}
spring.datasource.username=${OEBS_DB_USERNAME}
spring.datasource.password=${OEBS_DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.access=unrestricted

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

no.nav.security.jwt.issuer.azure.discoveryurl=https://login.microsoftonline.com/${AZURE_APP_TENANT_ID}/v2.0/.well-known/openid-configuration
no.nav.security.jwt.issuer.azure.accepted_audience=${AZURE_APP_CLIENT_ID}

#Swagger related endpoints
azure.openid.config.token-endpoint=${AZURE_OPENID_CONFIG_TOKEN_ENDPOINT}
azure.openid.config.authorization-endpoint=https://login.microsoftonline.com/${AZURE_APP_TENANT_ID}/oauth2/v2.0/authorize

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n
