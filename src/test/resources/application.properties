spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/placeholder
spring.datasource.username=username
spring.datasource.password=password

# Tells Hibernate which SQL dialect to use for Oracle, so it does not need a live
# database connection to determine this automatically on startup
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Prevents Hibernate from trying to create or drop tables on startup
spring.jpa.hibernate.ddl-auto=none

# Prevents Spring from trying to initialize the datasource during startup
spring.jpa.defer-datasource-initialization=false

