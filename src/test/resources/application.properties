# Placeholder-verdier for Oracle-databasen. Testen bruker ikke databasen direkte
# siden OkonomimodellService er mocket med @MockitoBean, men Spring krever at
# disse er satt for å kunne starte opp applikasjonskonteksten.
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/placeholder
spring.datasource.username=username
spring.datasource.password=password

# Gjør at Hikari-connection-poolen ikke feiler ved oppstart selv om Oracle-databasen
# ikke er tilgjengelig lokalt. Uten denne vil Spring kaste en exception under oppstart
# fordi Hikari forsøker å etablere en forbindelse med en gang.
spring.datasource.hikari.initialization-fail-timeout=-1

# Forteller Hibernate hvilken SQL-dialekt som skal brukes, slik at den ikke
# trenger en aktiv databaseforbindelse for å bestemme dette automatisk ved oppstart.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Hindrer Hibernate fra å forsøke å opprette eller slette tabeller ved oppstart.
spring.jpa.hibernate.ddl-auto=none

# Hindrer Spring fra å initialisere datakilden under oppstart.
spring.jpa.defer-datasource-initialization=false

# Overstyrer kontekststien fra main/application.properties (som er /api/v1)
# slik at testene kan kalle endepunktene direkte med f.eks. GET /segmenter
# uten å måtte bruke prefikset /api/v1/segmenter.
server.servlet.context-path=/

# Placeholder for Azure-token-endepunktet som er påkrevd av OpenApiConfig.
# Verdien brukes kun til å bygge Swagger-dokumentasjonen og er ikke funksjonell i tester.
azure.openid.config.token-endpoint=http://localhost/token
azure.openid.config.authorization-endpoint=http://localhost/authorize
