apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: okonomimodell-api-t1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{image}}
  port: 8080

  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no

  envFrom:
    - secret: okonomimodell-api-t1
    - secret: okonomimodell-api-t1-oracle

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java

  prometheus:
    enabled: true
    path: /api/v1/actuator/prometheus

  liveness:
    path: /api/v1/actuator/health/liveness
    initialDelay: 60
    periodSeconds: 10
    failureThreshold: 3

  readiness:
    path: /api/v1/actuator/health/readiness
    initialDelay: 60
    periodSeconds: 10
    failureThreshold: 3

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

  replicas:
    min: 1
    max: 2
    cpuThresholdPercentage: 80

  ingresses:
    - https://okonomimodell-api-t1.ekstern.dev.nav.no

  accessPolicy:
    inbound:
      rules:
        - application: azure-token-generator
          namespace: nais
          cluster: dev-gcp

  env:
    - name: SPRING_PROFILES_ACTIVE
      value: dev
