apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: okonomimodell-api
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{image}}
  port: 8080

  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no

  envFrom:
    - secret: okonomimodell-api-t1

  prometheus:
    enabled: true
    path: /api/v1/actuator/prometheus

  liveness:
    path: /api/v1/actuator/health/liveness
    initialDelay: 60
    periodSeconds: 10
    failureThreshold: 3

  readiness:
    path: /api/v1/actuator/health/readiness
    initialDelay: 60
    periodSeconds: 10
    failureThreshold: 3

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

  replicas:
    min: 1
    max: 2
    cpuThresholdPercentage: 80

  ingresses:
    - https://okonomimodell-api.intern.dev.nav.no

  accessPolicy:
    inbound:
      rules: []
    outbound:
      external:
        - ipv4: 10.53.104.43  # dmv43db01.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.44  # dmv43db02.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.45  # dmv43-scan.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.46  # dmv43-scan.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.47  # dmv43-scan.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.48  # dmv43-scan.adeo.no
          ports:
            - port: 1521
        - ipv4: 10.53.104.49  # dmv43-scan.adeo.no
          ports:
            - port: 1521

  env:
    - name: SPRING_PROFILES_ACTIVE
      value: dev
