name: Build and deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name == 'main')

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify -Pcoverage org.sonarsource.scanner.maven:sonar-maven-plugin:sonar

      - name: Build with Maven
        if: github.event_name == 'pull_request' || github.ref_name != 'main'
        run: ./mvnw --no-transfer-progress package

      - name: Push Docker image to GAR
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: team-oebs

  deploy-dev:
    name: Deploy to dev
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/app-dev.yaml
          VAR: image=${{ needs.build.outputs.image }}

  deploy-prod:
    name: Deploy to prod
    needs: [build, deploy-dev]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_prod == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/app-prod.yaml
          VAR: image=${{ needs.build.outputs.image }}
